name: Setup PowerShell
description: Installs a specific version of PowerShell to ensure consistent behavior across workflows

inputs:
  version:
    description: 'PowerShell version to install (e.g., 7.5.4, latest)'
    required: false
    default: '7.5.4'

runs:
  using: composite
  steps:
    - name: Install PowerShell ${{ inputs.version }}
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"

        if [ "$VERSION" = "latest" ]; then
          # Install latest from Microsoft repository
          wget -q https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
        else
          # Install specific version from GitHub releases
          UBUNTU_VERSION=$(lsb_release -rs)
          DEB_FILE="powershell_${VERSION}-1.deb_amd64.deb"
          DOWNLOAD_URL="https://github.com/PowerShell/PowerShell/releases/download/v${VERSION}/${DEB_FILE}"

          echo "Downloading PowerShell ${VERSION}..."
          wget -q "$DOWNLOAD_URL" -O /tmp/powershell.deb

          echo "Installing PowerShell ${VERSION}..."
          sudo dpkg -i /tmp/powershell.deb || sudo apt-get install -f -y
          rm /tmp/powershell.deb
        fi

        # Verify version
        echo "Installed PowerShell version:"
        pwsh --version
