server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend service.
    # BACKEND_HOST defaults to "backend" (docker-compose service name).
    # Override at runtime by rebuilding with a different NGINX_BACKEND_HOST build arg,
    # or by replacing this file in your deployment.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support large video file streaming
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 0;
    }

    # Health endpoint proxied from backend
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # SPA fallback: all other routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
